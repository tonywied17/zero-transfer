name: Release on version bump

on:
  push:
    branches:
      - main
  # NOTE: We deliberately do NOT use a `paths:` filter here. In practice GitHub
  # has been silently dropping this workflow on the very release-bump pushes it
  # is meant to handle (commits that touch ~400 files including the root
  # `package.json`); the resulting "no run" leaves the version bumped on
  # `main` but nothing tagged or published. The `detect` job below diffs the
  # version itself and short-circuits when it hasn't changed, so unconditional
  # firing on `main` is cheap and reliable.

permissions:
  contents: write
  id-token: write # required for npm package provenance attestations

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diff package.json version
        id: diff
        run: |
          NEW=$(node -p "require('./package.json').version")
          OLD=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" || echo "")
          echo "old=$OLD"
          echo "new=$NEW"
          if [ "$NEW" != "$OLD" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    name: Tag and create GitHub release
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -e
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          PRERELEASE=""
          if echo "$VERSION" | grep -qE 'alpha|beta|rc|next|dev|pre'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $PRERELEASE

  publish:
    name: Publish @zero-transfer/* to npmjs
    needs: [detect, tag]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate package
        run: npm run ci

      - name: Resolve dist-tag
        id: tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          if echo "$VERSION" | grep -qE 'alpha|beta|rc|next|dev|pre'; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate workspace stubs at SDK version
        run: npm run packages:generate

      - name: Regenerate documentation (HTML + Markdown + per-scope)
        run: npm run docs:all

      - name: Publish @zero-transfer/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ steps.tag.outputs.tag }}"

      - name: Publish @zero-transfer/* workspace stubs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            echo "Publishing $name@$version with tag ${{ steps.tag.outputs.tag }}"
            ( cd "$dir" && npm publish --access public --tag "${{ steps.tag.outputs.tag }}" )
          done

      - name: Summary
        run: |
          {
            echo "## Released ${{ needs.detect.outputs.version }} (${{ steps.tag.outputs.tag }})"
            echo ""
            echo "- @zero-transfer/sdk"
            for dir in packages/*/; do
              name=$(node -p "require('./$dir/package.json').name")
              echo "- $name"
            done
          } >> "$GITHUB_STEP_SUMMARY"
