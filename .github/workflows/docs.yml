name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build TypeDoc HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SDK (needed for TypeDoc entry points)
        run: npm run build

      - name: Generate scoped packages
        run: npm run packages:generate

      - name: Run tests with coverage + JSON report (for badges)
        run: npm run test:report

      - name: Generate TypeDoc HTML
        run: npm run docs

      - name: Generate shields.io badge JSON
        run: node scripts/generate-badges.mjs

      - name: Stage public assets alongside docs
        run: |
          mkdir -p docs/api/assets
          cp -R assets/. docs/api/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
