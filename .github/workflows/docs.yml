name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Starlight site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build SDK (needed so TypeDoc + Starlight can resolve src/)
        run: npm run build

      - name: Generate scoped packages
        run: npm run packages:generate

      - name: Run tests with coverage + JSON report (for badges)
        run: npm run test:report

      - name: Generate shields.io badge JSON
        run: node scripts/generate-badges.mjs

      - name: Stage badges + assets into website/public
        run: |
          mkdir -p website/public/badges
          cp -R docs/api/badges/. website/public/badges/
          mkdir -p website/public/assets
          cp -R assets/. website/public/assets/

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install website dependencies
        working-directory: website
        run: npm install --no-audit --no-fund

      - name: Build website
        working-directory: website
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
