name: Release (manual)

# Note: Automated publishing happens in release-on-bump.yml after the version
# in package.json changes on `main`. This workflow is a manual escape hatch
# for republishing or pushing pre-release tags without bumping package.json.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish under (e.g. latest, alpha, next)"
        required: true
        default: alpha
      dry_run:
        description: "Run npm publish with --dry-run only"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write # required for npm package provenance attestations

jobs:
  publish:
    name: Publish @zero-transfer/* to npmjs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate package
        run: npm run ci

      - name: Resolve dist-tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Regenerate workspace stubs at SDK version
        run: npm run packages:generate

      - name: Regenerate documentation (HTML + Markdown + per-scope)
        run: npm run docs:all

      - name: Publish @zero-transfer/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --tag "${{ steps.tag.outputs.tag }}"
          else
            npm publish --access public --tag "${{ steps.tag.outputs.tag }}"
          fi

      - name: Publish @zero-transfer/* workspace stubs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            echo "Publishing $name@$version with tag ${{ steps.tag.outputs.tag }}"
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              ( cd "$dir" && npm publish --dry-run --access public --tag "${{ steps.tag.outputs.tag }}" )
            else
              ( cd "$dir" && npm publish --access public --tag "${{ steps.tag.outputs.tag }}" )
            fi
          done

      - name: Summary
        run: |
          {
            echo "## Released ${{ steps.tag.outputs.tag }}"
            echo ""
            echo "- @zero-transfer/sdk"
            for dir in packages/*/; do
              name=$(node -p "require('./$dir/package.json').name")
              echo "- $name"
            done
          } >> "$GITHUB_STEP_SUMMARY"
