<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ZeroFTP SDK logo</title>
  <desc id="desc">A transparent animated ZeroFTP wordmark with flowing file-transfer paths.</desc>
  <style>
    .halo-shell {
      fill: none;
      stroke: #ffffff;
      stroke-width: 31;
      stroke-linecap: round;
      stroke-dasharray: 260 990;
      opacity: 0.8;
      animation: orbit 8s linear infinite;
      transform-origin: 246px 210px;
    }

    .halo-edge {
      fill: none;
      stroke: #07111f;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-dasharray: 260 990;
      opacity: 0.72;
      animation: orbit 8s linear infinite;
      transform-origin: 246px 210px;
    }

    .halo {
      fill: none;
      stroke: url(#haloGradient);
      stroke-width: 13;
      stroke-linecap: round;
      stroke-dasharray: 260 990;
      animation: orbit 8s linear infinite;
      transform-origin: 246px 210px;
    }

    .path-shell {
      fill: none;
      stroke: #ffffff;
      stroke-width: 22;
      stroke-linecap: round;
      stroke-dasharray: 35 28;
      opacity: 0.88;
      animation: flow 2.4s linear infinite;
    }

    .path-edge {
      fill: none;
      stroke: #07111f;
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 35 28;
      opacity: 0.78;
      animation: flow 2.4s linear infinite;
    }

    .path {
      fill: none;
      stroke: url(#pathGradient);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 35 28;
      animation: flow 2.4s linear infinite;
    }

    .node-halo {
      fill: #ffffff;
      opacity: 0.9;
    }

    .node-edge {
      fill: #07111f;
    }

    .node {
      fill: url(#nodeGradient);
      stroke: #ffffff;
      stroke-width: 3;
    }

    .node-glyph {
      fill: #07111f;
      opacity: 0.92;
    }

    .packet-shell {
      fill: #ffffff;
      opacity: 0.92;
      filter: url(#softGlow);
    }

    .packet {
      fill: #ffd166;
      stroke: #07111f;
      stroke-width: 3;
      filter: url(#packetGlow);
    }

    .wordmark-base,
    .tagline-base {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      paint-order: stroke fill;
    }

    .wordmark-base {
      font-size: 112px;
      font-weight: 820;
    }

    .tagline-base {
      font-size: 28px;
      font-weight: 620;
      letter-spacing: 4px;
    }

    .wordmark-shell {
      fill: none;
      stroke: #ffffff;
      stroke-width: 22;
      stroke-linejoin: round;
      opacity: 0.94;
    }

    .wordmark-edge {
      fill: none;
      stroke: #07111f;
      stroke-width: 12;
      stroke-linejoin: round;
      opacity: 0.92;
    }

    .wordmark {
      fill: url(#wordGradient);
    }

    .tagline-shell {
      fill: none;
      stroke: #ffffff;
      stroke-width: 10;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .tagline-edge {
      fill: none;
      stroke: #07111f;
      stroke-width: 5;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .tagline {
      fill: #14b8a6;
    }

    .slash {
      fill: url(#accentGradient);
      stroke: #07111f;
      stroke-width: 3;
      stroke-linejoin: round;
      animation: pulse 3.4s ease-in-out infinite;
    }

    @keyframes flow {
      to {
        stroke-dashoffset: -63;
      }
    }

    @keyframes orbit {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.84;
      }
      50% {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .halo-shell,
      .halo-edge,
      .halo,
      .path-shell,
      .path-edge,
      .path,
      .slash {
        animation: none;
      }

      .motion-packet {
        display: none;
      }
    }
  </style>
  <defs>
    <linearGradient id="pathGradient" x1="150" x2="520" y1="132" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="0.52" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="haloGradient" x1="130" x2="370" y1="82" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.2" />
      <stop offset="0.5" stop-color="#38bdf8" stop-opacity="0.9" />
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="112" x2="560" y1="170" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4" />
      <stop offset="0.5" stop-color="#7dd3fc" />
      <stop offset="1" stop-color="#fde68a" />
    </linearGradient>
    <linearGradient id="wordGradient" x1="620" x2="1076" y1="96" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e" />
      <stop offset="0.44" stop-color="#0284c7" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="690" x2="785" y1="108" y2="285" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="packetGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g>
    <path class="halo-shell" d="M246 76a134 134 0 1 1 0 268a134 134 0 1 1 0-268" />
    <path class="halo-edge" d="M246 76a134 134 0 1 1 0 268a134 134 0 1 1 0-268" />
    <path class="halo" d="M246 76a134 134 0 1 1 0 268a134 134 0 1 1 0-268" />
    <path class="path-shell" d="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
    <path class="path-edge" d="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
    <path class="path" d="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
    <circle class="node-halo" cx="150" cy="210" r="47" />
    <circle class="node-halo" cx="336" cy="210" r="47" />
    <circle class="node-halo" cx="522" cy="210" r="47" />
    <circle class="node-edge" cx="150" cy="210" r="42" />
    <circle class="node-edge" cx="336" cy="210" r="42" />
    <circle class="node-edge" cx="522" cy="210" r="42" />
    <circle class="node" cx="150" cy="210" r="35" />
    <circle class="node" cx="336" cy="210" r="35" />
    <circle class="node" cx="522" cy="210" r="35" />
    <path class="node-glyph" d="M134 194h32v32h-32zM320 194h32v32h-32zM506 194h32v32h-32z" />
    <g class="motion-packet">
      <circle class="packet-shell" r="13">
        <animateMotion dur="3.2s" repeatCount="indefinite" path="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
      </circle>
      <circle class="packet" r="8">
        <animateMotion dur="3.2s" repeatCount="indefinite" path="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
      </circle>
      <circle class="packet-shell" r="9">
        <animateMotion dur="3.2s" repeatCount="indefinite" begin="-1.15s" path="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
      </circle>
      <circle class="packet" r="5">
        <animateMotion dur="3.2s" repeatCount="indefinite" begin="-1.15s" path="M165 207 C210 132 291 132 337 207 S459 282 505 207" />
      </circle>
    </g>
    <text class="wordmark-base wordmark-shell" x="620" y="205">ZeroFTP</text>
    <text class="wordmark-base wordmark-edge" x="620" y="205">ZeroFTP</text>
    <text class="wordmark-base wordmark" x="620" y="205">ZeroFTP</text>
    <path class="slash" d="M770 242h36l-70 78h-36z" />
    <text class="tagline-base tagline-shell" x="624" y="284">TYPE-SAFE FILE TRANSFER SDK</text>
    <text class="tagline-base tagline-edge" x="624" y="284">TYPE-SAFE FILE TRANSFER SDK</text>
    <text class="tagline-base tagline" x="624" y="284">TYPE-SAFE FILE TRANSFER SDK</text>
  </g>
</svg>