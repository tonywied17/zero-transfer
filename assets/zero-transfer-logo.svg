<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 360" role="img" aria-labelledby="title desc">
  <title id="title">ZeroTransfer SDK logo</title>
  <desc id="desc">A sleek transparent ZeroTransfer wordmark with abstract transfer lanes.</desc>
  <style>
    :root {
      --ink: #0b1020;
      --muted: #536173;
      --edge: #ffffff;
      --ghost: rgba(15, 23, 42, 0.1);
      --accent-a: #2563eb;
      --accent-b: #7c3aed;
      --dot-edge: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f8fafc;
        --muted: #9aa7b8;
        --edge: #0d1117;
        --ghost: rgba(248, 250, 252, 0.12);
        --accent-a: #60a5fa;
        --accent-b: #a78bfa;
        --dot-edge: #0d1117;
      }
    }

    .wordmark,
    .tagline {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      paint-order: stroke fill;
      stroke: var(--edge);
      stroke-linejoin: round;
    }

    .wordmark {
      fill: var(--ink);
      font-size: 96px;
      font-weight: 760;
      stroke-width: 7px;
    }

    .wordmark-accent {
      fill: url(#accentGradient);
    }

    .tagline {
      fill: var(--muted);
      font-size: 24px;
      font-weight: 620;
      letter-spacing: 4px;
      stroke-width: 5px;
    }

    .mark-ghost {
      fill: none;
      stroke: var(--ghost);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 34px;
    }

    .lane-base {
      fill: none;
      stroke: var(--ink);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 16px;
      opacity: 0.92;
    }

    .lane-accent {
      fill: none;
      stroke: url(#accentGradient);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 16px;
      stroke-dasharray: 44 30;
      animation: laneFlow 5.5s linear infinite;
    }

    .node {
      fill: var(--edge);
      stroke: var(--ink);
      stroke-width: 8px;
    }

    .node-accent {
      fill: url(#accentGradient);
      stroke: var(--dot-edge);
      stroke-width: 6px;
    }

    .spark {
      fill: url(#accentGradient);
      stroke: var(--dot-edge);
      stroke-width: 5px;
      filter: url(#sparkGlow);
    }

    @keyframes laneFlow {
      to {
        stroke-dashoffset: -148;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .lane-accent,
      .motion-spark {
        animation: none;
      }

      .motion-spark {
        display: none;
      }
    }
  </style>
  <defs>
    <linearGradient id="accentGradient" x1="92" x2="1130" y1="80" y2="276" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--accent-a)" />
      <stop offset="1" stop-color="var(--accent-b)" />
    </linearGradient>
    <filter id="sparkGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feColorMatrix
        in="blur"
        result="glow"
        type="matrix"
        values="0 0 0 0 0.25 0 0 0 0 0.45 0 0 0 0 1 0 0 0 0.55 0"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <path id="transferLane" d="M98 94H310L156 180H368L214 266H426" />
  </defs>

  <g transform="translate(58 0)">
    <use href="#transferLane" class="mark-ghost" />
    <path class="lane-base" d="M98 94H310" />
    <path class="lane-base" d="M156 180H368" />
    <path class="lane-base" d="M214 266H426" />
    <path class="lane-accent" d="M310 94L156 180L368 180L214 266" />
    <circle class="node" cx="98" cy="94" r="18" />
    <circle class="node" cx="426" cy="266" r="18" />
    <circle class="node-accent" cx="368" cy="180" r="16" />
    <circle class="spark motion-spark" r="10">
      <animateMotion dur="4.8s" repeatCount="indefinite" path="M98 94H310L156 180H368L214 266H426" />
    </circle>
  </g>

  <text class="wordmark" x="530" y="168">Zero<tspan class="wordmark-accent">Transfer</tspan></text>
  <text class="tagline" x="536" y="222">SECURE FILE TRANSFER SDK</text>
</svg>