name: zero-transfer-integration

services:
  ftp:
    image: stilliard/pure-ftpd:hardened
    environment:
      PUBLICHOST: "localhost"
      FTP_USER_NAME: "zero"
      FTP_USER_PASS: "zero-pass"
      FTP_USER_HOME: "/home/zero"
      ADDED_FLAGS: "--tls=0 -p 30000:30009"
    ports:
      - "2121:21"
      - "30000-30009:30000-30009"

  ftps:
    image: stilliard/pure-ftpd:hardened
    environment:
      PUBLICHOST: "localhost"
      FTP_USER_NAME: "zero"
      FTP_USER_PASS: "zero-pass"
      FTP_USER_HOME: "/home/zero"
      ADDED_FLAGS: "--tls=1 -p 30010:30019"
    ports:
      - "2990:21"
      - "30010-30019:30010-30019"
    profiles:
      - integration

  sftp:
    image: atmoz/sftp:latest
    command: zero:zero-pass:::upload
    ports:
      - "2222:22"
    profiles:
      - integration

  # MinIO is a fully S3-compatible server used to validate the S3 provider
  # end-to-end (multipart uploads, range downloads, listings, deletes).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zero
      MINIO_ROOT_PASSWORD: zero-pass-1234
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles:
      - integration

  # Sidecar that creates the test bucket on the MinIO server. The S3
  # integration test waits on minio's healthcheck and then expects this
  # bucket to exist.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 zero zero-pass-1234 &&
      mc mb --ignore-existing local/zero-transfer-test &&
      mc anonymous set none local/zero-transfer-test
      "
    profiles:
      - integration

  # bytemark/webdav is a small Apache+mod_dav image used to validate the
  # WebDAV provider's PROPFIND/GET/PUT/DELETE/MOVE behaviour.
  webdav:
    image: bytemark/webdav:latest
    environment:
      AUTH_TYPE: Basic
      USERNAME: zero
      PASSWORD: zero-pass
    ports:
      - "8081:80"
    profiles:
      - integration
